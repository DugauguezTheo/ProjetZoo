<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="article-page.css">
  <title>Articles - AJC-Zoo</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <img src="/Arche_sans_fond.png" alt="Logo" class="logo">

  <h1 class="title">L'Arche des Joyaux Cachés</h1>

  <div class="spacer"></div>
</header>

<div class="page-layout">
  <div class="main-column">

    <section class="content">

      <h2 class="section-title">Articles en Boutique</h2>


      <div class="articles-grid" *ngIf="articles$ | async as articles">

        <div *ngIf="articles.length === 0" class="empty-state">
          Aucun article disponible en boutique
        </div>

        <div class="article-card" *ngFor="let article of articles" [routerLink]="['/boutique/article', article.id]">

          @if(article.quantiteStock >= 1){
            <div class="article-header">
              <h3>Article #{{ article?.id }}</h3>
            </div>

            <div class="article-body">

              <p>
                <span class="label">🛒 Article :</span>
                {{ article.libelle }}
              </p>

              <p>
                <span class="label">📦 Quantité :</span>
                {{ article.quantiteStock }}
              </p>

              <p>
                <span class="label">💰 Prix unitaire :</span>
                {{ article.prix }} €
              </p>

            </div>
          }

        </div>

      </div>

    </section>

  </div>
  <app-carte-logged></app-carte-logged>
</div>


<div class="animals">
  <img src="/panthere_final.gif" alt="Panthère">
  <img src="/poissons-qui-nagent.gif" alt="Poissons">
</div>

<footer>
  © 2026 Arche des Joyaux Cachés
</footer>

</body>
</html>
