<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="create-compte-page.css">
    <title>Inscription</title>
</head>

<body>

<div class="container">

  <img src="Arche_sans_fond.png" alt="Logo" class="logo">

  <h2>Création du compte</h2>

  <form>
    <label for="prenom">Prénom</label>
    <input id="prenom" type="text" placeholder="Paul" name="prenom" required> 

    <label for="nom">Nom</label>
    <input id="nom" type="text" placeholder="Dupont" name="nom" required> 

    <label>Sexe</label>
    <select name="sexe">
      <option value="homme">Homme</option>
      <option value="femme" selected>Femme</option>
      <option value="nb">NB</option>
    </select>

    <label>Adresse postale</label>
    <input type="text" name="adresse" required> 

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Téléphone</label>
    <input type="text" name="telephone">

    <label>Mot de passe</label>
    <input type="password" name="password" required>

    <input type="submit" value="Inscription">
  </form>

</div>

<img src="panthere_final.gif" class="panther" alt="Panthère">

</body>
</html>
