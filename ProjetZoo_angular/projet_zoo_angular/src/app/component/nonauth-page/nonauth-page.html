<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Arche</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #1c2b22;
      color: white;
      text-align: center;
    }

    .header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 15px 20px;
}

.logo {
  justify-self: start;
  max-width: 140px;
}

.title {
  justify-self: center;
  font-family: 'Cinzel', serif;
  margin: 0;
  letter-spacing: 2px;
  text-align: center;
}

/* sert à équilibrer la grille */
.spacer {
  justify-self: end;
}


    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .menu a {
      text-decoration: none;
      background: #d4af37;
      color: black;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .menu a:hover {
      background: #f1d46a;
    }

    .content {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }

    .animals {
      margin-top: 40px;
      position: relative;
      height: 120px;
      overflow: hidden;
    }

    .animals img {
      position: absolute;
      bottom: 0;
      width: 120px;
      animation: move 12s linear infinite;
    }

    .animals img:nth-child(2) {
      animation-delay: 6s;
    }

    @keyframes move {
      from { left: -150px; }
      to { left: 100%; }
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* 📱 Responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }

      .logo {
        max-width: 180px;
      }

      .menu {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <img src="/Arche_sans_fond.png" alt="Logo" class="logo">

  <h1 class="title">L'Arche des Joyaux Cachés</h1>

  <div class="spacer"></div>
</header>

<nav class="menu">
  <a href="#">Accueil</a>
  <a href="#">Connexion</a>
  <a href="#">Inscription</a>
</nav>

<section class="content">
  <h2>Bienvenue</h2>
  <p>
    Découvrez un univers fascinant d’animaux rares et de trésors cachés.
    Explorez, apprenez et vivez une expérience unique.
  </p>
</section>

<div class="animals">
  <img src="/panthere-qui-court.gif" alt="Panthère">
  <img src="/poissons-qui-nagent.gif" alt="Poissons">
</div>

<footer>
  © 2026 Arche des Joyaux Cachés
</footer>

</body>
</html>
