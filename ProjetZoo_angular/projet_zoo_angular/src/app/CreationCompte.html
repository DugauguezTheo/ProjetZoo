<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Création d'un compte utilisateur au zoo</title>
    
     <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter&display=swap" rel="stylesheet">
</head>

<body>

<form>
<fieldset>
  <legend>Création du compte</legend>
  <table>
  <tr><td>Prénom </td><td><input type="text" placeholder="Paul" name="prenom"></td></tr> 
  <tr><td>Nom </td><td><input type="text" placeholder="Dupont" name="nom"></td></tr> 
  <tr><td>Sexe</td>
    <td>
    <select name="sexeSelect">
      <option>Homme</option>
      <option selected>Femme</option>
      <option>NB</option>
    </select>
    <td>
  <tr><td>Adresse postale </td><td><input type="text" placeholder="1 rue de l'Arche 12345 Les-Joyaux" name="adresse"></td></tr> 
  <tr><td>Email </td><td><input type="text" placeholder="Paul.Dupont@outlook.fr" name="email"></td></tr> 
  <tr><td>Téléphone </td><td><input type="text" placeholder="0612345678" name="email"></td></tr> 
  <tr><td>Mot de passe </td><td><input type="password" placeholder="********" name="password"></td></tr>
  <!-- Deuxième demande pour vérification mot de passe ? -->
</table>
</fieldset>

<body>
</html>
